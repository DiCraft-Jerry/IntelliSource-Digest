<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- 头部 -->
  <header class="header">
    <span class="logo">&#x2728;</span>
    <h1>智源摘读</h1>
    <button class="gear-btn" id="gearBtn" title="API 设置">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- ========== 主视图 ========== -->
  <div class="view" id="mainView">
    <!-- 加载状态 -->
    <div class="loading" id="loading" style="display:none;">
      <div class="spinner"></div>
      <p id="loadingText">正在抓取网页信息...</p>
      <button class="btn btn-cancel" id="cancelBtn" type="button">取消</button>
    </div>

    <!-- 错误提示 -->
    <div class="error-msg" id="errorMsg" style="display:none;"></div>

    <!-- AI 总结 -->
    <section class="card" id="aiCard" style="display:none;">
      <div class="card-header">
        <h2>&#x1F916; AI 智能总结</h2>
        <button class="copy-btn" id="copyBtn" title="复制总结内容">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span>复制</span>
        </button>
        <button class="copy-btn export-btn" id="exportBtn" title="导出为 Markdown 文件">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span>导出</span>
        </button>
      </div>
      <div class="card-body">
        <div class="summary-content" id="summaryContent"></div>
      </div>
    </section>

    <!-- 网页基本信息 -->
    <section class="card" id="pageInfoCard" style="display:none;">
      <div class="card-header">
        <h2>&#x1F4C4; 网页基本信息</h2>
      </div>
      <div class="card-body">
        <div class="info-row">
          <span class="info-label">标题</span>
          <span class="info-value" id="pageTitle"></span>
        </div>
        <div class="info-row">
          <span class="info-label">描述</span>
          <span class="info-value" id="pageDesc"></span>
        </div>
        <div class="info-row">
          <span class="info-label">链接数量</span>
          <span class="info-value" id="linkCount"></span>
        </div>
        <details class="link-details" id="linkDetails">
          <summary>查看链接列表</summary>
          <div class="link-list-wrap">
            <ol id="linkList"></ol>
          </div>
        </details>
      </div>
    </section>

    <!-- 底部操作 -->
    <footer class="footer">
      <button class="btn btn-primary" id="reExtractBtn">&#x1F504; 重新抓取</button>
    </footer>

    <!-- 历史记录 -->
    <details class="history-details" id="historyDetails">
      <summary>历史记录 (<span id="historyCount">0</span>)</summary>
      <div class="history-list-wrap">
        <div id="historyList"></div>
      </div>
    </details>
  </div>

  <!-- ========== 设置视图 ========== -->
  <div class="view" id="settingsView" style="display:none;">
    <div class="settings-header">
      <button class="back-btn" id="backBtn" title="返回">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h2>&#x2699;&#xFE0F; API 设置</h2>
    </div>

    <section class="card">
      <div class="card-body">
        <!-- AI 供应商选择 -->
        <div class="form-group">
          <label for="provider">AI 供应商</label>
          <select id="provider">
            <option value="openai">OpenAI</option>
            <option value="deepseek">DeepSeek</option>
            <option value="qwen">通义千问 (阿里云)</option>
            <option value="moonshot">Moonshot (月之暗面)</option>
            <option value="zhipu">智谱 GLM</option>
            <option value="custom">自定义</option>
          </select>
        </div>
        <!-- API 地址（预设供应商：只读完整 URL） -->
        <div class="form-group" id="presetUrlGroup">
          <label for="apiUrl">API 地址</label>
          <input
            type="text"
            id="apiUrl"
            placeholder="https://api.openai.com/v1/chat/completions"
            autocomplete="off"
          >
          <span class="field-hint" id="urlHint"></span>
        </div>
        <!-- API 地址（自定义供应商：基础地址 + 路径） -->
        <div class="form-group" id="customUrlGroup" style="display:none;">
          <label for="customBaseUrl">API 基础地址</label>
          <input
            type="text"
            id="customBaseUrl"
            placeholder="https://your-api.example.com"
            autocomplete="off"
          >
          <label for="customApiPath">接口路径</label>
          <div class="input-row">
            <select id="apiPathPreset">
              <option value="/v1/chat/completions">/v1/chat/completions (对话模型)</option>
              <option value="/v1/completions">/v1/completions (补全模型)</option>
              <option value="__custom__">自定义路径...</option>
            </select>
            <input
              type="text"
              id="customApiPath"
              placeholder="/v1/chat/completions"
              autocomplete="off"
              style="display:none;"
            >
          </div>
          <span class="field-hint" id="customUrlHint"></span>
        </div>
        <!-- 测试连接 -->
        <div class="form-group" id="testConnGroup" style="display:none;">
          <button type="button" class="btn btn-outline btn-sm" id="testConnBtn">
            &#x1F50D; 测试连接
          </button>
          <span class="test-result" id="testResult"></span>
        </div>
        <!-- API Key -->
        <div class="form-group">
          <label for="apiKey">API Key</label>
          <div class="input-wrap">
            <input
              type="password"
              id="apiKey"
              placeholder="sk-xxxxxxxxxxxxxxxx"
              autocomplete="off"
            >
            <button type="button" class="toggle-eye" id="toggleApiKey" title="显示/隐藏 Key">
              <svg class="eye-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-off" style="display:none;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>
        <!-- 模型名称 -->
        <div class="form-group">
          <label for="model">模型名称</label>
          <div class="input-row">
            <input
              type="text"
              id="model"
              placeholder="gpt-4o"
              autocomplete="off"
            >
            <button type="button" class="btn btn-outline btn-sm" id="fetchModelsBtn" title="获取模型列表">
              &#x1F4CB; 获取模型
            </button>
          </div>
          <select id="modelSelect" class="model-select" size="5" style="display:none;"></select>
          <span class="field-hint" id="modelHint"></span>
        </div>
        <button class="btn btn-primary" id="saveSettingsBtn">保存设置</button>
        <p class="hint">API Key 仅保存在本地浏览器存储中，不会上传到任何第三方</p>
      </div>
    </section>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
